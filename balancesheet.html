<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Balance Sheet</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    #bs-widget {
      font-family: Georgia, serif;
      margin: 20px;
      font-size: 14px;
      color: #333;
    }
    #bs-widget h2 {
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    #bs-widget h2 .line1 { display: block; font-size: 20px; font-weight: bold; }
    #bs-widget h2 .line2 { display: block; font-size: 16px; font-weight: normal; color: #555; }
    #bs-widget h2 .line3 { display: block; font-size: 14px; font-weight: normal; color: #777; }
    .section { margin-bottom: 30px; }
    .section h3 { margin-bottom: 8px; font-size: 16px; font-weight: bold; color: #444; }
    .bs-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .bs-table th, .bs-table td {
      border: 1px solid #ccc;
      padding: 5px 8px;
      vertical-align: middle;
    }
    .bs-table th { background-color: #e6e6e6; text-align: center; font-size: 13px; }
    .bs-table th:first-child { text-align: left; }
    .bs-table td { text-align: right; font-size: 13px; }
    .bs-table td:first-child { text-align: left; }
    .account-row { font-weight: normal; }
    .subtotal-row { font-weight: bold; background-color: #f0f0f0; }
    .total-row { font-weight: bold; background-color: #e0e8f0; font-size: 14px; }
    .grand-total-row { font-weight: bold; background-color: #d0d8e8; font-size: 14px; border-top: 2px solid #999; }
    .favorable { color: #2a7d2a; }
    .unfavorable { color: #c0392b; }
    .zero { color: #999; }
    #controls-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 18px;
      align-items: center;
    }
    #controls-bar label {
      font-size: 13px;
      color: #555;
      font-weight: bold;
    }
    #controls-bar select {
      font-family: Georgia, serif;
      font-size: 13px;
      padding: 4px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
    #controls-bar select:hover { border-color: #888; }
    #balance-check {
      margin-top: 20px;
      border: 2px solid #999;
      border-radius: 6px;
      padding: 15px;
      background-color: #fafafa;
    }
    #balance-check h3 { margin: 0 0 10px 0; font-size: 16px; text-align: center; color: #333; }
    .check-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
    .check-box {
      text-align: center; padding: 10px;
      border: 1px solid #ddd; border-radius: 4px; background: #fff;
    }
    .check-box .label { font-size: 12px; color: #777; margin-bottom: 4px; }
    .check-box .value { font-size: 18px; font-weight: bold; }
    .check-box .sub { font-size: 11px; color: #999; margin-top: 2px; }
    .balanced { color: #2a7d2a; }
    .imbalanced { color: #c0392b; }
    #error-message { color: red; font-weight: bold; margin-top: 10px; text-align: center; font-size: 14px; }
    @media print {
      #bs-widget { margin: 10px; }
      .check-box .value { font-size: 16px; }
      #controls-bar { display: none; }
    }
    @media (max-width: 600px) {
      .bs-table { font-size: 11px; }
      .check-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="bs-widget">
    <h2>
      <span class="line1" id="orgName">Organization</span>
      <span class="line2">Balance Sheet</span>
      <span class="line3" id="subtitle"></span>
    </h2>

    <div id="controls-bar">
      <label for="year-select">Year:</label>
      <select id="year-select"></select>
      <label for="month-select">As of:</label>
      <select id="month-select">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
    </div>

    <div class="section">
      <h3>Assets</h3>
      <table class="bs-table" id="assets-table">
        <tr><th>Account</th><th>Balance</th></tr>
      </table>
    </div>

    <div class="section">
      <h3>Liabilities</h3>
      <table class="bs-table" id="liabilities-table">
        <tr><th>Account</th><th>Balance</th></tr>
      </table>
    </div>

    <div class="section">
      <h3>Equity</h3>
      <table class="bs-table" id="equity-table">
        <tr><th>Account</th><th>Balance</th></tr>
      </table>
    </div>

    <div id="balance-check">
      <h3>Balance Check</h3>
      <div class="check-grid">
        <div class="check-box">
          <div class="label">Total Assets</div>
          <div class="value" id="check-assets">&mdash;</div>
        </div>
        <div class="check-box">
          <div class="label">Total Liabilities + Equity</div>
          <div class="value" id="check-liab-equity">&mdash;</div>
        </div>
        <div class="check-box">
          <div class="label">Difference</div>
          <div class="value" id="check-diff">&mdash;</div>
          <div class="sub" id="check-status"></div>
        </div>
      </div>
    </div>

    <div id="error-message"></div>
  </div>

  <script>
    grist.ready({ columns: [], requiredAccess: 'read table' });

    var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Balance sheet account type IDs
    var BS_TYPES = {
      BANK: 3, AR: 4, ASSET: 5, LIABILITY: 6, EQUITY: 7,
      INCOME: 1, EXPENSE: 2, TRANSFER: 10
    };

    var rawTransRecords = [];
    var rawBankTxRecords = [];
    var bankAccountsById = {};
    var accountsById = {};
    var typeMap = {};

    function fmt(amount) {
      var abs = Math.abs(amount);
      var str = abs.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      return amount < 0 ? '($' + str + ')' : '$' + str;
    }

    function convertToRecords(data) {
      if (Array.isArray(data)) return data;
      var numRows = data.id ? data.id.length : 0;
      var columns = Object.keys(data);
      var records = [];
      for (var i = 0; i < numRows; i++) {
        var record = { id: data.id[i] };
        columns.forEach(function(col) { if (col !== 'id') record[col] = data[col][i]; });
        records.push(record);
      }
      return records;
    }

    function clearTable(tableId) {
      var table = document.getElementById(tableId);
      while (table.rows.length > 1) {
        table.deleteRow(table.rows.length - 1);
      }
    }

    function addAccountRow(table, name, balance, cssClass) {
      var tr = table.insertRow();
      tr.className = cssClass || 'account-row';
      var nameCell = tr.insertCell(0);
      var balCell = tr.insertCell(1);
      nameCell.textContent = name;
      balCell.textContent = fmt(balance);
      if (Math.abs(balance) < 0.005) {
        balCell.className = 'zero';
      }
    }

    function populateYearDropdown() {
      var yearSet = {};
      rawBankTxRecords.forEach(function(t) {
        if (t.Year) yearSet[t.Year] = true;
      });
      rawTransRecords.forEach(function(t) {
        if (t.Year_Posted) yearSet[t.Year_Posted] = true;
      });
      var years = Object.keys(yearSet).map(Number).sort();
      var select = document.getElementById('year-select');
      select.innerHTML = '';
      years.forEach(function(y) {
        var opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        select.appendChild(opt);
      });
      return years;
    }

    function renderReport(year, throughMonth) {
      clearTable('assets-table');
      clearTable('liabilities-table');
      clearTable('equity-table');

      document.getElementById('subtitle').textContent =
        'As of ' + MONTH_NAMES[throughMonth - 1] + ' ' + year;

      // --- BANK BALANCES from Bank_Transactions ---
      var bankBalanceByBankId = {};
      rawBankTxRecords.forEach(function(t) {
        if (!t.Year || !t.Month) return;
        if (t.Year > year) return;
        if (t.Year === year && t.Month > throughMonth) return;
        var bankId = t.Bank_Name;
        if (!bankId) return;
        bankBalanceByBankId[bankId] = (bankBalanceByBankId[bankId] || 0) + (t.Amount || 0);
      });

      // --- CATEGORIZATION BALANCES for non-bank BS accounts ---
      var catBalanceByAccount = {};
      rawTransRecords.forEach(function(t) {
        if (!t.Year_Posted || !t.Month_Posted) return;
        if (t.Year_Posted > year) return;
        if (t.Year_Posted === year && t.Month_Posted > throughMonth) return;
        var acctId = t.Account_Long_Name;
        if (!acctId) return;
        catBalanceByAccount[acctId] = (catBalanceByAccount[acctId] || 0) + (t.Amount || 0);
      });

      // --- BUILD BANK ACCOUNTS LIST ---
      var bankAccounts = [];
      Object.keys(bankAccountsById).forEach(function(id) {
        var ba = bankAccountsById[id];
        var balance = bankBalanceByBankId[Number(id)] || 0;
        bankAccounts.push({ name: ba.Bank_Account_Name, balance: balance, code: Number(id) });
      });
      bankAccounts.sort(function(a, b) { return a.code - b.code; });

      // --- BUILD OTHER BS ACCOUNTS from Accounts table ---
      var arAccounts = [], assetAccounts = [];
      var liabilityAccounts = [], equityAccounts = [];

      Object.keys(accountsById).forEach(function(id) {
        var acct = accountsById[id];
        var typeId = acct.ACCOUNT_TYPE;
        var balance = catBalanceByAccount[Number(id)] || 0;
        var entry = { name: acct.ACCOUNT_NAME, balance: balance, code: acct.ACCOUNT_CODE };

        if (typeId === BS_TYPES.AR) arAccounts.push(entry);
        else if (typeId === BS_TYPES.ASSET) assetAccounts.push(entry);
        else if (typeId === BS_TYPES.LIABILITY) liabilityAccounts.push(entry);
        else if (typeId === BS_TYPES.EQUITY) equityAccounts.push(entry);
      });

      var sortByCode = function(a, b) { return (a.code || 0) - (b.code || 0); };
      arAccounts.sort(sortByCode);
      assetAccounts.sort(sortByCode);
      liabilityAccounts.sort(sortByCode);
      equityAccounts.sort(sortByCode);

      // --- ASSETS TABLE ---
      var assetsTable = document.getElementById('assets-table');
      var totalBank = 0, totalAR = 0, totalAsset = 0;

      // Bank accounts
      if (bankAccounts.length > 0) {
        var headerTr = assetsTable.insertRow();
        headerTr.className = 'subtotal-row';
        headerTr.insertCell(0).textContent = 'Bank Accounts';
        headerTr.insertCell(1).textContent = '';

        bankAccounts.forEach(function(a) {
          addAccountRow(assetsTable, '\u00A0\u00A0\u00A0\u00A0' + a.name, a.balance);
          totalBank += a.balance;
        });
        addAccountRow(assetsTable, 'Total Bank Accounts', totalBank, 'subtotal-row');
      }

      // Accounts Receivable
      if (arAccounts.length > 0) {
        var arHeader = assetsTable.insertRow();
        arHeader.className = 'subtotal-row';
        arHeader.insertCell(0).textContent = 'Accounts Receivable';
        arHeader.insertCell(1).textContent = '';

        arAccounts.forEach(function(a) {
          addAccountRow(assetsTable, '\u00A0\u00A0\u00A0\u00A0' + a.name, a.balance);
          totalAR += a.balance;
        });
        addAccountRow(assetsTable, 'Total Accounts Receivable', totalAR, 'subtotal-row');
      }

      // Other Assets
      if (assetAccounts.length > 0) {
        var assetHeader = assetsTable.insertRow();
        assetHeader.className = 'subtotal-row';
        assetHeader.insertCell(0).textContent = 'Other Assets';
        assetHeader.insertCell(1).textContent = '';

        assetAccounts.forEach(function(a) {
          addAccountRow(assetsTable, '\u00A0\u00A0\u00A0\u00A0' + a.name, a.balance);
          totalAsset += a.balance;
        });
        addAccountRow(assetsTable, 'Total Other Assets', totalAsset, 'subtotal-row');
      }

      var totalAssets = totalBank + totalAR + totalAsset;
      addAccountRow(assetsTable, 'TOTAL ASSETS', totalAssets, 'grand-total-row');

      // --- LIABILITIES TABLE ---
      var liabTable = document.getElementById('liabilities-table');
      var totalLiab = 0;

      liabilityAccounts.forEach(function(a) {
        var displayBalance = -a.balance; // Liabilities: credits are positive in accounting
        addAccountRow(liabTable, a.name, displayBalance);
        totalLiab += displayBalance;
      });
      addAccountRow(liabTable, 'TOTAL LIABILITIES', totalLiab, 'grand-total-row');

      // --- EQUITY TABLE ---
      var equityTable = document.getElementById('equity-table');
      var totalEquity = 0;

      equityAccounts.forEach(function(a) {
        var displayBalance = -a.balance; // Equity: credits are positive in accounting
        addAccountRow(equityTable, a.name, displayBalance);
        totalEquity += displayBalance;
      });

      // Net Income = sum of all income + expense categorizations through date
      // Income transactions are positive, expense transactions are negative
      var netIncome = 0;
      rawTransRecords.forEach(function(t) {
        if (!t.Year_Posted || !t.Month_Posted) return;
        if (t.Year_Posted > year) return;
        if (t.Year_Posted === year && t.Month_Posted > throughMonth) return;
        var acctId = t.Account_Long_Name;
        if (!acctId) return;
        var acct = accountsById[acctId];
        if (!acct) return;
        var typeId = acct.ACCOUNT_TYPE;
        if (typeId === BS_TYPES.INCOME || typeId === 8) {
          netIncome += (t.Amount || 0);
        } else if (typeId === BS_TYPES.EXPENSE || typeId === 9) {
          netIncome += (t.Amount || 0);
        }
      });

      addAccountRow(equityTable, 'Net Income', netIncome, 'subtotal-row');
      totalEquity += netIncome;
      addAccountRow(equityTable, 'TOTAL EQUITY', totalEquity, 'grand-total-row');

      var totalLiabEquity = totalLiab + totalEquity;

      // --- BALANCE CHECK ---
      document.getElementById('check-assets').textContent = fmt(totalAssets);
      document.getElementById('check-liab-equity').textContent = fmt(totalLiabEquity);

      var diff = totalAssets - totalLiabEquity;
      document.getElementById('check-diff').textContent = fmt(diff);

      if (Math.abs(diff) < 0.01) {
        document.getElementById('check-diff').className = 'value balanced';
        document.getElementById('check-status').textContent = 'Balanced';
        document.getElementById('check-status').style.color = '#2a7d2a';
      } else {
        document.getElementById('check-diff').className = 'value imbalanced';
        document.getElementById('check-status').textContent = 'Out of Balance';
        document.getElementById('check-status').style.color = '#c0392b';
      }
    }

    async function loadData() {
      var errorEl = document.getElementById('error-message');
      try {
        var results = await Promise.all([
          grist.docApi.fetchTable('Transaction_Categorization'),
          grist.docApi.fetchTable('Accounts'),
          grist.docApi.fetchTable('Account_Types'),
          grist.docApi.fetchTable('Organization_Settings'),
          grist.docApi.fetchTable('Bank_Transactions'),
          grist.docApi.fetchTable('Bank_Accounts')
        ]);
        var transData = results[0], accData = results[1];
        var typeData = results[2], orgData = results[3];
        var bankTxData = results[4], bankAcctData = results[5];

        var orgRecords = convertToRecords(orgData);
        var orgName = (orgRecords.length > 0 && orgRecords[0].Org_Name) ? orgRecords[0].Org_Name : 'Organization';
        document.getElementById('orgName').textContent = orgName;

        var typeRecords = convertToRecords(typeData);
        typeRecords.forEach(function(r) { typeMap[r.id] = r.TYPE_NAME; });

        var accRecords = convertToRecords(accData);
        accRecords.forEach(function(r) { accountsById[r.id] = r; });

        var bankAcctRecords = convertToRecords(bankAcctData);
        bankAcctRecords.forEach(function(r) { bankAccountsById[r.id] = r; });

        rawTransRecords = convertToRecords(transData);
        rawBankTxRecords = convertToRecords(bankTxData);

        // Populate year dropdown
        var now = new Date();
        var currentYear = now.getFullYear();
        var currentMonth = now.getMonth() + 1;
        var years = populateYearDropdown();

        var yearSelect = document.getElementById('year-select');
        var monthSelect = document.getElementById('month-select');

        if (years.indexOf(currentYear) !== -1) {
          yearSelect.value = currentYear;
          monthSelect.value = currentMonth;
        } else if (years.length > 0) {
          yearSelect.value = years[years.length - 1];
          monthSelect.value = 12;
        }

        yearSelect.addEventListener('change', function() {
          var selectedYear = Number(yearSelect.value);
          if (selectedYear === currentYear) {
            monthSelect.value = currentMonth;
          } else if (selectedYear < currentYear) {
            monthSelect.value = 12;
          }
          renderReport(selectedYear, Number(monthSelect.value));
        });
        monthSelect.addEventListener('change', function() {
          renderReport(Number(yearSelect.value), Number(monthSelect.value));
        });

        renderReport(Number(yearSelect.value), Number(monthSelect.value));

      } catch (err) {
        console.error('Error loading data:', err);
        errorEl.textContent = 'Error loading data: ' + err.message;
      }
    }

    loadData();
  </script>
</body>
</html>
