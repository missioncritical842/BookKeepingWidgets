<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Public Support Test</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    #pst-widget {
      font-family: Georgia, serif;
      margin: 20px;
      font-size: 14px;
      color: #333;
    }
    #pst-widget h2 {
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    #pst-widget h2 .line1 { display: block; font-size: 20px; font-weight: bold; }
    #pst-widget h2 .line2 { display: block; font-size: 16px; font-weight: normal; color: #555; }
    #pst-widget h2 .line3 { display: block; font-size: 14px; font-weight: normal; color: #777; }
    .threshold-box {
      margin-bottom: 15px;
      font-size: 14px;
    }
    .threshold-box .label { font-weight: bold; }
    .pst-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .pst-table th, .pst-table td {
      border: 1px solid #ccc;
      padding: 4px 8px;
      vertical-align: middle;
    }
    .pst-table th {
      background-color: #e6e6e6;
      text-align: right;
      font-size: 12px;
    }
    .pst-table th:first-child { text-align: left; }
    .pst-table td { text-align: right; }
    .pst-table td:first-child { text-align: left; }
    .donor-row:nth-child(even) { background-color: #f9f9f9; }
    .total-row {
      font-weight: bold;
      background-color: #e0e8f0;
      border-top: 2px solid #999;
    }
    .section-header {
      font-weight: bold;
      background-color: #f0f0f0;
      font-size: 13px;
    }
    .section-header td { text-align: left !important; font-style: italic; }
    .gross-row:nth-child(even) { background-color: #f9f9f9; }
    .result-box {
      padding: 15px 20px;
      border-radius: 6px;
      font-size: 15px;
      text-align: center;
    }
    .result-pass {
      background-color: #d4edda;
      border: 2px solid #28a745;
      color: #155724;
    }
    .result-fail {
      background-color: #f8d7da;
      border: 2px solid #dc3545;
      color: #721c24;
    }
    .result-warn {
      background-color: #fff3cd;
      border: 2px solid #ffc107;
      color: #856404;
    }
    .result-box .big-number {
      font-size: 28px;
      font-weight: bold;
      display: block;
      margin: 8px 0;
    }
    .result-box .detail-line {
      font-size: 13px;
      margin: 4px 0;
    }
    .results-container {
      display: flex;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }
    .results-container .result-box {
      flex: 1;
      min-width: 220px;
    }
    .summary-section {
      margin-top: 25px;
    }
    .summary-section h3 {
      font-size: 15px;
      margin: 15px 0 8px 0;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }
    .summary-table {
      width: auto;
      border-collapse: collapse;
      font-size: 13px;
    }
    .summary-table td {
      padding: 4px 12px;
      border: 1px solid #ccc;
    }
    .summary-table td:last-child { text-align: right; }
    .summary-table .summary-label { font-weight: bold; }
    .summary-table .summary-highlight { background-color: #e8f0fe; }
    #error-message { color: red; font-weight: bold; margin-top: 10px; text-align: center; font-size: 14px; }
    @media print {
      #pst-widget { margin: 10px; }
    }
    @media (max-width: 600px) {
      .pst-table { font-size: 10px; }
      .results-container { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="pst-widget">
    <h2>
      <span class="line1" id="orgName">Organization</span>
      <span class="line2">Public Support Test</span>
      <span class="line3" id="subtitle"></span>
    </h2>

    <div class="threshold-box">
      <span class="label">2% of Total Support:</span>
      <span id="threshold-value"></span>
    </div>

    <table class="pst-table" id="pst-table">
    </table>

    <div id="summary-area"></div>
    <div id="result-area"></div>
    <div id="error-message"></div>
  </div>

  <script>
    grist.ready({ columns: [], requiredAccess: 'read table' });

    var accountsById = {};
    var individBizContribIds = {};
    var educationServicesIds = {};
    var productSalesIds = {};
    var investmentsIds = {};

    function buildAccountDescendantSet(rootName) {
      var targetIds = {};
      Object.keys(accountsById).forEach(function(id) {
        if (accountsById[id].ACCOUNT_NAME === rootName) {
          targetIds[Number(id)] = true;
        }
      });
      var accountsByAccId = {};
      Object.keys(accountsById).forEach(function(id) {
        var a = accountsById[id];
        if (a.ACCOUNT_ID) accountsByAccId[a.ACCOUNT_ID] = a;
      });
      var result = {};
      Object.keys(accountsById).forEach(function(id) {
        var current = accountsById[id];
        var seen = {};
        while (current) {
          if (targetIds[current.id]) { result[Number(id)] = true; break; }
          var pid = current.PARENT_ACCOUNT;
          if (!pid || seen[pid]) break;
          seen[pid] = true;
          current = accountsByAccId[pid] ? accountsById[Object.keys(accountsById).find(function(k) { return accountsById[k].ACCOUNT_ID === pid; })] : null;
        }
      });
      return result;
    }

    function buildAccountSets() {
      individBizContribIds = buildAccountDescendantSet('Individ, Business Contributions');
      educationServicesIds = buildAccountDescendantSet('Education Services');
      productSalesIds = buildAccountDescendantSet('Product Sales');
      investmentsIds = buildAccountDescendantSet('Investments');
    }

    function fmt(amount) {
      if (amount === null || amount === undefined || amount === 0) return '';
      var abs = Math.abs(amount);
      var str = abs.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      return amount < 0 ? '(' + str + ')' : str;
    }

    function fmtAlways(amount) {
      var abs = Math.abs(amount || 0);
      var str = abs.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      return (amount || 0) < 0 ? '($' + str + ')' : '$' + str;
    }

    function convertToRecords(data) {
      if (Array.isArray(data)) return data;
      var numRows = data.id ? data.id.length : 0;
      var columns = Object.keys(data);
      var records = [];
      for (var i = 0; i < numRows; i++) {
        var record = { id: data.id[i] };
        columns.forEach(function(col) { if (col !== 'id') record[col] = data[col][i]; });
        records.push(record);
      }
      return records;
    }

    async function loadData() {
      var errorEl = document.getElementById('error-message');
      try {
        var results = await Promise.all([
          grist.docApi.fetchTable('Public_Support_History'),
          grist.docApi.fetchTable('Transaction_Categorization'),
          grist.docApi.fetchTable('People_Companies'),
          grist.docApi.fetchTable('Accounts'),
          grist.docApi.fetchTable('Organization_Settings'),
          grist.docApi.fetchTable('Gross_Receipts_Related')
        ]);

        var histData = results[0], transData = results[1], peopleData = results[2];
        var accData = results[3], orgData = results[4], grossData = results[5];

        var orgRecords = convertToRecords(orgData);
        var orgName = (orgRecords.length > 0 && orgRecords[0].Org_Name) ? orgRecords[0].Org_Name : 'Organization';
        document.getElementById('orgName').textContent = orgName;

        var accRecords = convertToRecords(accData);
        accRecords.forEach(function(r) { accountsById[r.id] = r; });
        buildAccountSets();

        var peopleRecords = convertToRecords(peopleData);
        var peopleById = {};
        peopleRecords.forEach(function(r) { peopleById[r.id] = r; });

        var histRecords = convertToRecords(histData);
        var transRecords = convertToRecords(transData);
        var grossRecords = convertToRecords(grossData);

        // Report is through end of previous year
        var now = new Date();
        var currentYear = now.getFullYear();
        var liveYear = currentYear - 1;
        var startYear = liveYear - 4;

        // Map each historical year to column name in Public_Support_History (Y20XX)
        var histYearCols = {};
        for (var y = startYear; y < liveYear; y++) {
          histYearCols[y] = 'Y' + y;
        }

        // Map each year to column name in Gross_Receipts_Related (c20XX)
        var grossYearCols = {};
        for (var y = startYear; y <= liveYear; y++) {
          grossYearCols[y] = 'c' + y;
        }

        // ========== CONTRIBUTIONS ==========
        var donors = {};

        // Process historical contribution data
        histRecords.forEach(function(h) {
          var personId = h.Donor_Name;
          if (!personId) return;
          if (!donors[personId]) {
            var person = peopleById[personId];
            var name = person ? (person.Display_Name || (person.First_Name + ' ' + person.Last_Name)) : 'Unknown';
            donors[personId] = { name: name, years: {} };
          }
          for (var y = startYear; y < liveYear; y++) {
            var col = histYearCols[y];
            if (h[col] && h[col] > 0) {
              donors[personId].years[y] = (donors[personId].years[y] || 0) + h[col];
            }
          }
        });

        // ========== LIVE YEAR TRANSACTIONS ==========
        var liveGrossTuition = 0;
        var liveGrossProductSales = 0;
        var liveInvestmentIncome = 0;

        // For 509(a)(2): track gross receipts by payer for per-payer cap
        // grossByPayer[category][payerId] = total amount
        var grossByPayer = { tuition: {} };

        transRecords.forEach(function(t) {
          if (t.Year_Posted !== liveYear) return;
          var acctId = t.Account_Long_Name;
          if (!acctId) return;
          var amount = t.Amount || 0;
          if (amount === 0) return;
          var payerId = t.From_To || 0;

          // Gross receipts: Education Services = "Tuition & Fees"
          if (educationServicesIds[acctId]) {
            liveGrossTuition += amount;
            grossByPayer.tuition[payerId] = (grossByPayer.tuition[payerId] || 0) + amount;
            return;
          }
          // Gross receipts: Product Sales (many payers, no per-payer cap needed)
          if (productSalesIds[acctId]) {
            liveGrossProductSales += amount;
            return;
          }
          // Investment income
          if (investmentsIds[acctId]) {
            liveInvestmentIncome += amount;
            return;
          }

          // Donor contributions: Individ, Business Contributions
          if (!individBizContribIds[acctId]) return;

          if (!payerId || payerId === 0) {
            if (!donors['noname']) {
              donors['noname'] = { name: 'No Name', years: {} };
            }
            donors['noname'].years[liveYear] = (donors['noname'].years[liveYear] || 0) + amount;
          } else {
            if (!donors[payerId]) {
              var person = peopleById[payerId];
              var name = person ? (person.Display_Name || (person.First_Name + ' ' + person.Last_Name)) : 'Unknown';
              donors[payerId] = { name: name, years: {} };
            }
            donors[payerId].years[liveYear] = (donors[payerId].years[liveYear] || 0) + amount;
          }
        });

        // ========== BUILD DONOR DISPLAY ROWS ==========
        var allYears = [];
        for (var y = startYear; y <= liveYear; y++) allYears.push(y);

        var rows = [];
        Object.keys(donors).forEach(function(key) {
          var d = donors[key];
          var fiveYrTotal = 0;
          for (var y = startYear; y <= liveYear; y++) {
            fiveYrTotal += (d.years[y] || 0);
          }
          if (fiveYrTotal === 0) {
            var hasAny = false;
            allYears.forEach(function(yr) { if (d.years[yr]) hasAny = true; });
            if (!hasAny) return;
          }
          rows.push({ name: d.name, years: d.years, fiveYrTotal: fiveYrTotal });
        });

        rows.sort(function(a, b) { return a.name.localeCompare(b.name); });

        var grandTotalContrib = 0;
        rows.forEach(function(r) { grandTotalContrib += r.fiveYrTotal; });

        // ========== GROSS RECEIPTS (for display table) ==========
        var liveGrossAmounts = {
          'Tuition & Fees': liveGrossTuition,
          'Product Sales': liveGrossProductSales
        };

        var grossRows = [];
        var grossYearTotals = {};
        allYears.forEach(function(y) { grossYearTotals[y] = 0; });
        var grossFiveYrGrand = 0;

        grossRecords.forEach(function(g) {
          var row = { category: g.Category, years: {}, fiveYrTotal: 0 };
          allYears.forEach(function(y) {
            var val;
            if (y === liveYear) {
              val = liveGrossAmounts[g.Category] || 0;
            } else {
              var col = grossYearCols[y];
              val = g[col] || 0;
            }
            row.years[y] = val;
            row.fiveYrTotal += val;
            grossYearTotals[y] += val;
          });
          grossFiveYrGrand += row.fiveYrTotal;
          grossRows.push(row);
        });

        // ========== 170(b)(1)(A)(vi) CALCULATION ==========
        var totalSupport170 = grandTotalContrib + grossFiveYrGrand;
        var threshold2pct = totalSupport170 * 0.02;

        rows.forEach(function(r) {
          if (r.fiveYrTotal > threshold2pct) {
            r.excess = r.fiveYrTotal - threshold2pct;
            r.excessRounded = Math.round(r.excess);
          } else {
            r.excess = 0;
            r.excessRounded = 0;
          }
        });

        var yearTotals = {};
        allYears.forEach(function(y) { yearTotals[y] = 0; });
        var totalExcess = 0;
        var totalExcessRounded = 0;
        rows.forEach(function(r) {
          allYears.forEach(function(y) {
            yearTotals[y] += (r.years[y] || 0);
          });
          totalExcess += r.excess;
          totalExcessRounded += r.excessRounded;
        });

        var publicSupport170 = grandTotalContrib - totalExcessRounded;
        var pct170 = totalSupport170 > 0 ? (publicSupport170 / totalSupport170) * 100 : 0;
        var passes170auto = pct170 >= 33.333;
        var passes170facts = pct170 >= 10.0;

        // ========== 509(a)(2) CALCULATION ==========
        // Total support = contributions + gross receipts (uncapped) + investment income
        var totalInvestmentIncome = liveInvestmentIncome; // only have live year data
        var totalSupport509 = grandTotalContrib + grossFiveYrGrand + totalInvestmentIncome;

        // Per-payer cap: greater of $5,000 or 1% of total support
        var capAmount = Math.max(5000, totalSupport509 * 0.01);

        // Capped gross receipts for live year
        // Per-payer cap only applies to tuition; product sales have many small payers
        var liveCappedTuition = 0;
        Object.keys(grossByPayer.tuition).forEach(function(pid) {
          liveCappedTuition += Math.min(grossByPayer.tuition[pid], capAmount);
        });
        var liveCappedGross = liveCappedTuition + liveGrossProductSales;

        // Historical gross receipts: no per-payer data, use totals as-is
        // (conservative: if any single payer exceeded cap historically, this overstates)
        var historicalGross = grossFiveYrGrand - liveGrossTuition - liveGrossProductSales;
        var cappedGrossTotal = historicalGross + liveCappedGross;

        // 509(a)(2) numerator: contributions (no 2% reduction) + capped gross receipts
        var publicSupport509 = grandTotalContrib + cappedGrossTotal;

        var pct509support = totalSupport509 > 0 ? (publicSupport509 / totalSupport509) * 100 : 0;
        var pct509invest = totalSupport509 > 0 ? (totalInvestmentIncome / totalSupport509) * 100 : 0;
        var passes509support = pct509support >= 33.333;
        var passes509invest = pct509invest <= 33.333;
        var passes509 = passes509support && passes509invest;

        // ========== RENDER UI ==========
        document.getElementById('subtitle').textContent = 'As of 12/31/' + liveYear;
        document.getElementById('threshold-value').textContent = '$' + threshold2pct.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

        var table = document.getElementById('pst-table');
        table.innerHTML = '';
        var numCols = allYears.length + 4;

        // Header
        var thead = document.createElement('thead');
        var hRow = document.createElement('tr');
        hRow.appendChild(makeTh('', true));
        allYears.forEach(function(y) { hRow.appendChild(makeTh(y)); });
        ['Total 5 Yr\nContrib', 'Excess\nContr', 'Rounded'].forEach(function(label) {
          var th = makeTh(label);
          th.style.whiteSpace = 'pre-line';
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        table.appendChild(thead);

        var tbody = document.createElement('tbody');

        // Donor rows
        rows.forEach(function(r) {
          var tr = document.createElement('tr');
          tr.className = 'donor-row';
          var tdName = makeTd(r.name, true);
          tdName.style.whiteSpace = 'nowrap';
          tr.appendChild(tdName);
          allYears.forEach(function(y) {
            tr.appendChild(makeTd(fmt(r.years[y] || 0)));
          });
          tr.appendChild(makeTd(fmt(r.fiveYrTotal)));
          tr.appendChild(makeTd(fmt(r.excess)));
          tr.appendChild(makeTd(fmt(r.excessRounded)));
          tbody.appendChild(tr);
        });

        // Contributions total
        var totalTr = document.createElement('tr');
        totalTr.className = 'total-row';
        totalTr.appendChild(makeTd(''));
        allYears.forEach(function(y) { totalTr.appendChild(makeTd(fmt(yearTotals[y]))); });
        totalTr.appendChild(makeTd(fmt(grandTotalContrib)));
        totalTr.appendChild(makeTd(fmt(totalExcess)));
        totalTr.appendChild(makeTd(fmt(totalExcessRounded)));
        tbody.appendChild(totalTr);

        // Spacer
        var spacer = document.createElement('tr');
        var spacerTd = document.createElement('td');
        spacerTd.colSpan = numCols;
        spacerTd.style.height = '15px';
        spacerTd.style.border = 'none';
        spacer.appendChild(spacerTd);
        tbody.appendChild(spacer);

        // Gross Receipts header
        var grHeader = document.createElement('tr');
        grHeader.className = 'section-header';
        var grTd = document.createElement('td');
        grTd.colSpan = numCols;
        grTd.textContent = 'Gross Receipts of Related Activities';
        grHeader.appendChild(grTd);
        tbody.appendChild(grHeader);

        // Gross receipt rows
        grossRows.forEach(function(g) {
          var tr = document.createElement('tr');
          tr.className = 'gross-row';
          tr.appendChild(makeTd(g.category, true));
          allYears.forEach(function(y) { tr.appendChild(makeTd(fmt(g.years[y]))); });
          tr.appendChild(makeTd(fmt(g.fiveYrTotal)));
          tr.appendChild(makeTd(''));
          tr.appendChild(makeTd(''));
          tbody.appendChild(tr);
        });

        // Gross receipts total
        var grTotalTr = document.createElement('tr');
        grTotalTr.className = 'total-row';
        grTotalTr.appendChild(makeTd(''));
        allYears.forEach(function(y) { grTotalTr.appendChild(makeTd(fmt(grossYearTotals[y]))); });
        grTotalTr.appendChild(makeTd(fmt(grossFiveYrGrand)));
        grTotalTr.appendChild(makeTd(''));
        grTotalTr.appendChild(makeTd(''));
        tbody.appendChild(grTotalTr);

        // Investment income row
        if (totalInvestmentIncome > 0) {
          var invSpacer = document.createElement('tr');
          var invSpacerTd = document.createElement('td');
          invSpacerTd.colSpan = numCols;
          invSpacerTd.style.height = '10px';
          invSpacerTd.style.border = 'none';
          invSpacer.appendChild(invSpacerTd);
          tbody.appendChild(invSpacer);

          var invHeader = document.createElement('tr');
          invHeader.className = 'section-header';
          var invHdrTd = document.createElement('td');
          invHdrTd.colSpan = numCols;
          invHdrTd.textContent = 'Investment Income';
          invHeader.appendChild(invHdrTd);
          tbody.appendChild(invHeader);

          var invTr = document.createElement('tr');
          invTr.className = 'gross-row';
          invTr.appendChild(makeTd('Interest Income', true));
          allYears.forEach(function(y) {
            invTr.appendChild(makeTd(y === liveYear ? fmt(liveInvestmentIncome) : ''));
          });
          invTr.appendChild(makeTd(fmt(totalInvestmentIncome)));
          invTr.appendChild(makeTd(''));
          invTr.appendChild(makeTd(''));
          tbody.appendChild(invTr);
        }

        table.appendChild(tbody);

        // ========== SUMMARY TABLES ==========
        var summaryArea = document.getElementById('summary-area');
        summaryArea.innerHTML = '';

        // --- 170(b)(1)(A)(vi) Summary ---
        var sec1 = document.createElement('div');
        sec1.className = 'summary-section';
        var h3a = document.createElement('h3');
        h3a.textContent = '\u00A7170(b)(1)(A)(vi) — Public Charity Test';
        sec1.appendChild(h3a);
        var sum1 = buildSummaryTable([
          ['Total Contributions (5-Year)', fmtAlways(grandTotalContrib)],
          ['Gross Receipts of Related Activities', fmtAlways(grossFiveYrGrand)],
          ['Total Support', fmtAlways(totalSupport170)],
          ['Less: Excess Contributions (over 2%)', fmtAlways(totalExcessRounded)],
          ['Public Support', fmtAlways(publicSupport170), true],
          ['Public Support %', pct170.toFixed(2) + '%', true]
        ]);
        sec1.appendChild(sum1);
        summaryArea.appendChild(sec1);

        // --- 509(a)(2) Summary ---
        var sec2 = document.createElement('div');
        sec2.className = 'summary-section';
        var h3b = document.createElement('h3');
        h3b.textContent = '\u00A7509(a)(2) — Gross Receipts Test';
        sec2.appendChild(h3b);
        var sum2 = buildSummaryTable([
          ['Total Contributions (5-Year)', fmtAlways(grandTotalContrib)],
          ['Gross Receipts — Uncapped', fmtAlways(grossFiveYrGrand)],
          ['Investment Income', fmtAlways(totalInvestmentIncome)],
          ['Total Support', fmtAlways(totalSupport509)],
          ['Per-Payer Cap (greater of $5,000 or 1%)', fmtAlways(capAmount)],
          ['Gross Receipts — Capped', fmtAlways(cappedGrossTotal)],
          ['Public Support (Contributions + Capped Gross)', fmtAlways(publicSupport509), true],
          ['Public Support %', pct509support.toFixed(2) + '%', true],
          ['Investment Income %', pct509invest.toFixed(2) + '%']
        ]);
        sec2.appendChild(sum2);
        summaryArea.appendChild(sec2);

        // ========== RESULT BOXES ==========
        var resultArea = document.getElementById('result-area');
        resultArea.innerHTML = '';
        var container = document.createElement('div');
        container.className = 'results-container';

        // 170 Automatic
        container.appendChild(makeResultBox(
          'Test 1: Automatic',
          '\u00A7170(b)(1)(A)(vi)',
          passes170auto,
          pct170.toFixed(2) + '% public support',
          'Must be at least 33.33%',
          passes170auto ? 'result-pass' : 'result-fail'
        ));

        // 170 Facts & Circumstances
        var factsClass = passes170facts ? (passes170auto ? 'result-pass' : 'result-warn') : 'result-fail';
        container.appendChild(makeResultBox(
          'Test 2: Facts & Circ.',
          '\u00A7170(b)(1)(A)(vi) — 10%',
          passes170facts,
          pct170.toFixed(2) + '% public support',
          'Must be at least 10%, plus qualifying factors',
          factsClass
        ));

        // 509(a)(2)
        container.appendChild(makeResultBox(
          'Test 3: Gross Receipts',
          '\u00A7509(a)(2)',
          passes509,
          pct509support.toFixed(2) + '% public support',
          'Support \u226533.33% and investment income \u226433.33%',
          passes509 ? 'result-pass' : 'result-fail'
        ));

        resultArea.appendChild(container);

      } catch (err) {
        console.error('Error loading data:', err);
        errorEl.textContent = 'Error loading data: ' + err.message;
      }
    }

    function makeTd(text, leftAlign) {
      var td = document.createElement('td');
      td.textContent = text;
      if (leftAlign) td.style.textAlign = 'left';
      return td;
    }

    function makeTh(text, leftAlign) {
      var th = document.createElement('th');
      th.textContent = text;
      if (leftAlign) th.style.textAlign = 'left';
      return th;
    }

    function buildSummaryTable(rowData) {
      var tbl = document.createElement('table');
      tbl.className = 'summary-table';
      rowData.forEach(function(s) {
        var tr = document.createElement('tr');
        if (s[2]) tr.className = 'summary-highlight';
        var td1 = document.createElement('td');
        td1.className = 'summary-label';
        td1.textContent = s[0];
        tr.appendChild(td1);
        var td2 = document.createElement('td');
        td2.textContent = s[1];
        tr.appendChild(td2);
        tbl.appendChild(tr);
      });
      return tbl;
    }

    function makeResultBox(title, subtitle, passes, pctLine, reqLine, cssClass) {
      var box = document.createElement('div');
      box.className = 'result-box ' + cssClass;
      box.innerHTML =
        '<div class="detail-line"><strong>' + title + '</strong></div>' +
        '<div class="detail-line">' + subtitle + '</div>' +
        '<span class="big-number">' + (passes ? 'PASSES' : 'DOES NOT PASS') + '</span>' +
        '<div class="detail-line">' + pctLine + '</div>' +
        '<div class="detail-line">(' + reqLine + ')</div>';
      return box;
    }

    loadData();
  </script>
</body>
</html>
